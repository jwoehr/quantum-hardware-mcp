name: Quantum Snapshot

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  # Allow a manual run from the GitHub Actions tab to test without waiting
  workflow_dispatch:

# Needs write access to commit data/snapshots.csv back to the repo
permissions:
  contents: write

env:
  # Opt into Node.js 24 now — Node 20 actions are deprecated as of June 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install qiskit-ibm-runtime python-dotenv boto3 requests

      - name: Fetch device stats
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
          IONQ_API_KEY: ${{ secrets.IONQ_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: python snapshot.py

      - name: Commit snapshot to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.csv
          # Only commit if the file actually changed (skips if API returned nothing)
          git diff --staged --quiet || \
            git commit -m "data: device snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
